<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--p:#7C3AED;--pd:#5B21B6;--pdd:#4C1D95;--pl:#A78BFA;--pll:#C4B5FD;--pb:#EDE9FE;--a:#F59E0B;--al:#FCD34D;--bg:#0C0A15;--bg2:#13101F;--cd:#1A1625;--ch:#231E33;--tx:#F8F7FF;--tx2:#A5A0B8;--tx3:#6B6580;--ok:#10B981;--no:#EF4444;--wn:#F59E0B;--bd:#2A2540}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif}
body{background:var(--bg);color:var(--tx);overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--pd);border-radius:3px}
input,textarea,select,button{font-family:inherit}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes toastIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toastOut{from{transform:translateX(0);opacity:1}to{transform:translateX(110%);opacity:0}}
.aUp{animation:slideUp .4s ease-out both}.aFi{animation:fadeIn .3s ease-out both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}.d5{animation-delay:.25s}.d6{animation-delay:.3s}.d7{animation-delay:.35s}.d8{animation-delay:.4s}
.btnP{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;border:none;padding:9px 18px;border-radius:10px;font-weight:600;cursor:pointer;transition:all .2s;font-size:13px;display:inline-flex;align-items:center;justify-content:center;gap:5px}
.btnP:hover{box-shadow:0 4px 16px rgba(124,58,237,.3)}.btnP:active{transform:scale(.97)}
.btnS{background:var(--cd);color:var(--tx);border:1px solid var(--bd);padding:8px 16px;border-radius:10px;font-weight:500;cursor:pointer;transition:all .2s;font-size:13px}
.btnS:hover{background:var(--ch);border-color:var(--pl)}.btnS:active{transform:scale(.97)}
.btnOk{background:linear-gradient(135deg,var(--ok),#059669);color:#fff;border:none;padding:9px 18px;border-radius:10px;font-weight:600;cursor:pointer;transition:all .2s;font-size:13px;display:inline-flex;align-items:center;justify-content:center;gap:5px}
.btnOk:hover{box-shadow:0 4px 16px rgba(16,185,129,.3)}.btnOk:active{transform:scale(.97)}
.btnNo{background:transparent;color:var(--no);border:1px solid var(--no);padding:8px 16px;border-radius:10px;font-weight:600;cursor:pointer;transition:all .2s;font-size:13px}
.btnNo:hover{background:rgba(239,68,68,.1)}.btnNo:active{transform:scale(.97)}
.btnWn{background:linear-gradient(135deg,var(--a),#D97706);color:#000;border:none;padding:9px 18px;border-radius:10px;font-weight:600;cursor:pointer;transition:all .2s;font-size:13px}
.btnWn:active{transform:scale(.97)}
.btnI{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--cd);border:1px solid var(--bd);color:var(--tx);cursor:pointer;transition:all .15s;flex-shrink:0}
.btnI:hover{background:var(--ch);border-color:var(--pl)}.btnI:active{transform:scale(.92)}
.inp{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:9px;padding:9px 13px;color:var(--tx);font-size:13px;outline:none;transition:border .2s}
.inp:focus{border-color:var(--pl);box-shadow:0 0 0 3px rgba(124,58,237,.1)}
.inp::placeholder{color:var(--tx3)}
.gc{background:var(--cd);border:1px solid var(--bd);border-radius:14px;transition:all .25s;overflow:hidden}
.gc:hover{border-color:rgba(124,58,237,.3)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:14px;font-size:10px;font-weight:600;gap:3px}
.bOk{background:rgba(16,185,129,.13);color:var(--ok)}.bWn{background:rgba(245,158,11,.13);color:var(--wn)}.bNo{background:rgba(239,68,68,.13);color:var(--no)}.bPr{background:rgba(124,58,237,.13);color:var(--pl)}
#toasts{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;max-width:380px}
.toast{pointer-events:auto;background:var(--cd);border:1px solid var(--bd);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;animation:toastIn .35s ease-out;box-shadow:0 8px 25px rgba(0,0,0,.4)}
.toast.out{animation:toastOut .25s ease-in forwards}
.toastI{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
.toastB{flex:1;min-width:0}.toastT{font-weight:600;font-size:12px}.toastM{font-size:11px;color:var(--tx2);margin-top:1px}
.sidebar{width:250px;background:var(--bg2);border-right:1px solid var(--bd);height:100vh;position:fixed;left:0;top:0;z-index:200;display:flex;flex-direction:column;padding:16px 0;overflow-y:auto}
.si{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--tx2);transition:all .15s;font-size:13px;border-left:3px solid transparent}
.si:hover{background:rgba(124,58,237,.06);color:var(--tx)}.si.on{background:rgba(124,58,237,.1);color:var(--pl);border-left-color:var(--p)}
.si i{width:18px;text-align:center;font-size:13px}
.sc{padding:0 20px;margin-top:16px;margin-bottom:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--tx3)}
.st{background:var(--cd);border:1px solid var(--bd);border-radius:14px;padding:18px;transition:all .25s}
.st:hover{border-color:var(--pl);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.25)}
.moOv{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.moCt{background:var(--cd);border:1px solid var(--bd);border-radius:18px;padding:24px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease-out}
.pbar{height:5px;background:var(--bg);border-radius:3px;overflow:hidden}.pfill{height:100%;border-radius:3px;transition:width .4s ease}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:10px 12px;font-size:11px;font-weight:600;color:var(--tx3);border-bottom:1px solid var(--bd);text-transform:uppercase;letter-spacing:.5px}
.tbl td{padding:10px 12px;border-bottom:1px solid rgba(42,37,64,.5)}
.tbl tr:hover td{background:rgba(124,58,237,.03)}
.loginOrb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.3}
@keyframes orbF{0%,100%{transform:translate(0,0)}33%{transform:translate(30px,-20px)}66%{transform:translate(-20px,15px)}}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot-ok{background:var(--ok)}.dot-wn{background:var(--wn)}.dot-no{background:var(--no)}.dot-off{background:var(--tx3)}
</style>
</head>
<body>

<!-- ========== LOGIN ========== -->
<div id="pg-login" style="min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden">
  <div class="loginOrb" style="width:350px;height:350px;background:var(--p);top:-60px;left:-60px;animation:orbF 8s ease-in-out infinite"></div>
  <div class="loginOrb" style="width:280px;height:280px;background:var(--pl);bottom:-40px;right:-40px;animation:orbF 8s ease-in-out infinite;animation-delay:3s"></div>
  <div class="loginOrb" style="width:180px;height:180px;background:var(--a);top:30%;right:15%;animation:orbF 8s ease-in-out infinite;animation-delay:5s;opacity:.15"></div>
  <div class="gc aUp" style="padding:40px 36px;width:420px;max-width:95vw;position:relative;z-index:2">
    <div class="flex justify-center mb-6">
      <svg viewBox="0 0 220 70" width="200" height="64">
        <defs><linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#A78BFA"/><stop offset="100%" stop-color="#7C3AED"/></linearGradient></defs>
        <path d="M28 8C28 8,12 22,12 33C12 42,19 49,28 49C37 49,44 42,44 33C44 22,28 8,28 8Z" fill="url(#g1)"/>
        <circle cx="28" cy="31" r="6" fill="#fff"/>
        <line x1="48" y1="24" x2="58" y2="24" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="50" y1="30" x2="64" y2="30" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="48" y1="36" x2="56" y2="36" stroke="#5B21B6" stroke-width="2.5" stroke-linecap="round" opacity=".7"/>
        <text x="72" y="42" font-family="Outfit" font-weight="900" font-size="30" fill="#F8F7FF">Aky</text>
        <text x="116" y="42" font-family="Outfit" font-weight="900" font-size="30" fill="url(#g1)">Voy</text>
        <text x="72" y="54" font-family="Outfit" font-weight="300" font-size="9" fill="#A78BFA" letter-spacing="3.5">PANEL DE CONTROL</text>
      </svg>
    </div>
    <div class="text-center mb-5">
      <div class="w-14 h-14 rounded-2xl mx-auto mb-3 flex items-center justify-center" style="background:linear-gradient(135deg,var(--p),var(--pd))"><i class="fas fa-shield-halved text-xl" style="color:#fff"></i></div>
      <h2 class="text-xl font-bold">Acceso Administrativo</h2>
      <p class="text-xs mt-1" style="color:var(--tx2)">Solo personal autorizado</p>
    </div>
    <div class="mb-3"><label class="text-xs font-medium mb-1 block" style="color:var(--tx2)">ID de Administrador</label><input id="lId" class="inp" placeholder="Tu ID"></div>
    <div class="mb-5"><label class="text-xs font-medium mb-1 block" style="color:var(--tx2)">Contraseña</label><input id="lPass" type="password" class="inp" placeholder="Contraseña de acceso"></div>
    <button onclick="doLogin()" class="btnP w-full py-3 text-sm"><i class="fas fa-lock mr-2"></i>Ingresar al Panel</button>
    <p id="lErr" class="text-center text-xs mt-3 hidden" style="color:var(--no)"></p>
  </div>
</div>

<!-- ========== PANEL ========== -->
<div id="pg-panel" class="hidden">
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="px-5 mb-5 flex items-center gap-2">
      <svg viewBox="0 0 220 70" width="120" height="38"><path d="M28 8C28 8,12 22,12 33C12 42,19 49,28 49C37 49,44 42,44 33C44 22,28 8,28 8Z" fill="url(#g1)"/><circle cx="28" cy="31" r="6" fill="#fff"/><line x1="48" y1="24" x2="58" y2="24" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round"/><line x1="50" y1="30" x2="64" y2="30" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/><line x1="48" y1="36" x2="56" y2="36" stroke="#5B21B6" stroke-width="2.5" stroke-linecap="round" opacity=".7"/><text x="72" y="42" font-family="Outfit" font-weight="900" font-size="26" fill="#F8F7FF">Aky<tspan fill="#A78BFA">Voy</tspan></text></svg>
    </div>
    <div class="sc">Principal</div>
    <div class="si on" onclick="goSec('dashboard',this)"><i class="fas fa-chart-line"></i>Dashboard</div>
    <div class="si" onclick="goSec('users',this)"><i class="fas fa-users"></i>Usuarios</div>
    <div class="si" onclick="goSec('restaurants',this)"><i class="fas fa-store"></i>Comedores</div>
    <div class="si" onclick="goSec('drivers',this)"><i class="fas fa-motorcycle"></i>Repartidores</div>

    <div class="sc">Sistema</div>
    <div class="si" onclick="goSec('finance',this)"><i class="fas fa-dollar-sign"></i>Finanzas</div>
    <div class="si" onclick="goSec('notifs',this)"><i class="fas fa-bell"></i>Notificaciones</div>
    <div class="si" onclick="goSec('contracts',this)"><i class="fas fa-file-contract"></i>Contratos</div>
    <div class="si" onclick="goSec('settings',this)"><i class="fas fa-gear"></i>Configuración</div>
    <div class="mt-auto px-4 pt-4 border-t" style="border-color:var(--bd)">
      <div class="flex items-center gap-3 mb-3"><div class="w-9 h-9 rounded-full flex items-center justify-center" style="background:var(--pd)"><i class="fas fa-user-shield text-sm" style="color:var(--pl)"></i></div><div><div class="text-sm font-semibold">Emmanuel</div><div class="text-xs" style="color:var(--tx3)">Super Admin</div></div></div>
      <button onclick="logout()" class="btnS w-full text-xs"><i class="fas fa-right-from-bracket mr-1"></i>Cerrar Sesión</button>
    </div>
  </nav>

  <!-- Main -->
  <main style="margin-left:250px;min-height:100vh;padding:24px 28px">
    <div class="flex items-center justify-between mb-6">
      <div><h1 class="text-2xl font-bold" id="secTitle">Dashboard</h1><p class="text-sm" style="color:var(--tx2)" id="secSub">Vista general del sistema AkyVoy</p></div>

        <button class="btnI" onclick="renderNotifs()"><i class="fas fa-bell text-sm"></i></button>
      </div>
    </div>
    <div id="s-dashboard" class="sec"></div>
    <div id="s-users" class="sec hidden"></div>
    <div id="s-restaurants" class="sec hidden"></div>
    <div id="s-drivers" class="sec hidden"></div>
    <div id="s-orders" class="sec hidden"></div>
    <div id="s-finance" class="sec hidden"></div>
    <div id="s-notifs" class="sec hidden"></div>
    <div id="s-contracts" class="sec hidden"></div>
    <div id="s-settings" class="sec hidden"></div>
  </main>
</div>

<div id="toasts"></div>
<div id="modal"></div>

<script>
/* ============================================================

   Credenciales: ID=Emmanuel, Pass=Torres2515
   ============================================================ */

// BroadcastChannel
const BC=new BroadcastChannel('akyvoy_channel');
BC.onmessage=function(e){
  const d=e.data;if(!d||d.to!=='panel')return;
  switch(d.type){
    case 'menu_updated': addNotif('Menú Actualizado','Comedor '+d.restId+' actualizó su menú','info'); renderNotifs(); break;
    case 'new_order_sys': addNotif('Nuevo Pedido',d.orderCode+' - $'+d.total,'ok'); renderNotifs(); renderOrders(); break;
  }
};
function sendMsg(to,type,data={}){BC.postMessage({from:'panel',to,type,...data})}

// Estado
const S={
  users:loadD('aky_p_users',genUsers()),
  restaurants:loadD('aky_p_rests',genRests()),
  drivers:loadD('aky_p_drvs',genDrivers()),
  allOrders:loadD('aky_p_orders',genOrders()),
  notifs:loadD('aky_p_notifs',genNotifs()),
  settings:{appName:'AkyVoy',commRate:2,monthlyFee:29.99,radius:10,currency:'USD',darkMode:true},
};

function loadD(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def}catch(e){return def}}
function saveD(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}

  {id:3,name:'Ana López',email:'ana@email.com',phone:'+1 555-0103',orders:8,spent:95,status:'active',joined:'2025-01-10'},
  {id:4,name:'Pedro Martínez',email:'pedro@email.com',phone:'+1 555-0104',orders:45,spent:780,status:'active',joined:'2024-08-20'},

function genOrders(){const st=['delivered','delivered','delivered','delivered','delivered','delivered','delivering','accepted','pending','cancelled'];const rests=S.restaurants.filter(r=>r.status==='active');const orders=[];for(let i=0;i<30;i++){const r=rests[Math.floor(Math.random()*rests.length)];orders.push({code:'AK-'+(1100+i),rest:r.name,restCode:r.code,items:['Bandeja Paisa x1','Pizza x2','Sushi x3','Burger x1','Jugo x4'][Math.floor(Math.random()*5)],total:parseFloat((Math.random()*30+5).toFixed(2)),status:st[Math.floor(Math.random()*st.length)],client:['María G.','Juan P.','Ana L.','Pedro M.','Diego R.','Sofía H.'][Math.floor(Math.random()*6)],driver:['Carlos M.','Miguel T.','Andrés L.','David Q.'][Math.floor(Math.random()*4)],time:`${8+Math.floor(Math.random()*10)}:${String(Math.floor(Math.random()*60)).padStart(2,'0')}`,date:'2025-01-'+String(25+Math.floor(Math.random()*6)).padStart(2,'0'),commission:parseFloat((Math.random()*1).toFixed(2))})}return orders}

function genNotifs(){return[
  {id:1,title:'Nuevo repartidor solicitante',msg:'Fernando Gil (REP-0043) solicitó acceso',type:'wn',time:'Hace 15 min',read:false},

function drawCharts(){
  // Gráfico de barras - pedidos por día
  const c1=document.getElementById('chartOrders');if(!c1)return;
  const ctx1=c1.getContext('2d');const w=c1.width=c1.offsetWidth*2;c1.height=360;ctx1.scale(1,1);
  const days=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];const vals=[32,45,38,52,41,58,48];const mx=Math.max(...vals);
  ctx1.clearRect(0,0,w,360);
  // Grid
  for(let i=0;i<4;i++){const y=30+i*75;ctx1.strokeStyle='rgba(42,37,64,.5)';ctx1.lineWidth=1;ctx1.beginPath();ctx1.moveTo(50,y);ctx1.lineTo(w-20,y);ctx1.stroke();ctx1.fillStyle='#6B6580';ctx1.font='18px Outfit';ctx1.textAlign='right';ctx1.fillText(Math.round(mx-mx/3*i),45,y+5)}
  // Barras
  const bw=Math.max(20,(w-100)/7*.6);const gap=(w-100)/7;
  vals.forEach((v,i)=>{
    const x=70+i*gap;const h=Math.max(4,v/mx*280);const y=310-h;
    const gr=ctx1.createLinearGradient(x,y,x,310);gr.addColorStop(0,'#7C3AED');gr.addColorStop(1,'#5B21B6');
    ctx1.fillStyle=gr;ctx1.beginPath();ctx1.roundRect(x,y,bw,h,6);ctx1.fill();
    ctx1.fillStyle='#A5A0B8';ctx1.font='18px Outfit';ctx1.textAlign='center';ctx1.fillText(days[i],x+bw/2,340);
    ctx1.fillStyle='#F8F7FF';ctx1.font='bold 18px Outfit';ctx1.fillText(v,x+bw/2,y-8);
  });

  // Gráfico de dona - distribución
  const c2=document.getElementById('chartDist');if(!c2)return;
  const ctx2=c2.getContext('2d');c2.width=c2.offsetWidth*2;c2.height=360;
  const data=[{l:'Pedidos',v:65,c:'#7C3AED'},{l:'Mensualidad',v:20,c:'#F59E0B'},{l:'Comisiones',v:15,c:'#10B981'}];
  const cx2=c2.width/2,cy2=170,r=110;let angle=-Math.PI/2;
  data.forEach(d=>{
    const slice=d.v/100*Math.PI*2;
    ctx2.fillStyle=d.c;ctx2.beginPath();ctx2.moveTo(cx2,cy2);ctx2.arc(cx2,cy2,r,angle,angle+slice);ctx2.closePath();ctx2.fill();
    angle+=slice;
  });
  ctx2.fillStyle=getComputedStyle(document.body).getPropertyValue('--cd').trim()||'#1A1625';ctx2.beginPath();ctx2.arc(cx2,cy2,r*.55,0,Math.PI*2);ctx2.fill();
  ctx2.fillStyle='#F8F7FF';ctx2.font='bold 28px Outfit';ctx2.textAlign='center';ctx2.fillText('$12.4K',cx2,cy2+10);
  // Leyenda
  data.forEach((d,i)=>{const ly=320+i*28;ctx2.fillStyle=d.c;ctx2.beginPath();ctx2.roundRect(cx2-80,ly-6,12,12,3);ctx2.fill();ctx2.fillStyle='#A5A0B8';ctx2.font='18px Outfit';ctx2.textAlign='left';ctx2.fillText(d.l+' '+d.v+'%',cx2-62,ly+5)});
}
