<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AkyVoy Panel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#0C0A15;color:#F8F7FF;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{background:#1A1625;border:1px solid #2A2540;border-radius:20px;padding:40px;width:400px;max-width:95vw;text-align:center}
input{width:100%;background:#0C0A15;border:1px solid #2A2540;border-radius:10px;padding:12px;color:#F8F7FF;font-size:15px;margin-bottom:12px;outline:none}
input:focus{border-color:#7C3AED}
button{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px}
.entrar{background:#7C3AED;color:#fff}
.demo{background:#F59E0B;color:#000}
.error{color:#EF4444;font-size:13px;margin-top:8px;display:none}
</style>
</head>
<body>
<div class="box">
  <h2 style="margin-bottom:8px">AkyVoy Panel</h2>
  <p style="color:#A5A0B8;font-size:13px;margin-bottom:24px">Acceso Administrativo</p>
  <input id="id" placeholder="ID de Administrador">
  <input id="pw" type="password" placeholder="Contraseña">
  <button class="entrar" onclick="login()">Ingresar</button>
  <button class="demo" onclick="directo()">Entrar Directo (Demo)</button>
  <div class="error" id="err">Credenciales incorrectas</div>
  <div id="ok" style="display:none;padding:30px">
    <div style="font-size:40px;margin-bottom:12px">&#9989;</div>
    <h3 style="color:#10B981;margin-bottom:8px">Acceso Concedido</h3>
    <p style="color:#A5A0B8;font-size:13px">Bienvenido Emmanuel. El login funciona correctamente.</p>
    <p style="color:#6B6580;font-size:12px;margin-top:12px">Si ves esto, el problema no es el login.<br>Reemplaza este archivo con el panel completo.</p>
  </div>
</div>
<script>
function login(){
  var i=document.getElementById('id').value.trim();
  var p=document.getElementById('pw').value;
  if(i==='Emmanuel' && p==='Torres2515'){
    document.getElementById('ok').style.display='block';
    document.querySelector('.box').querySelector('h2').style.display='none';
    document.querySelector('.box').querySelector('p').style.display='none';
    document.getElementById('id').style.display='none';
    document.getElementById('pw').style.display='none';
    document.querySelector('.entrar').style.display='none';
    document.querySelector('.demo').style.display='none';
    document.getElementById('err').style.display='none';
  } else {
    document.getElementById('err').style.display='block';
  }
}
function directo(){
  document.getElementById('id').value='Emmanuel';
  document.getElementById('pw').value='Torres2515';
  login();
}
</script>
</body>
</html>
